services:
  - type: web
    name: faqDocs-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false          # se carga manual en el dashboard de Render
      - key: DATABASE_URL
        sync: false          # se carga manual en el dashboard de Render
